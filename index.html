<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MirrorHands - Odaklanmış Ayna</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000000; z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      .start-btn {
        padding: 20px 40px; font-size: 22px; font-weight: bold; cursor: pointer;
        border: 2px solid #ffffff; border-radius: 50px; background-color: #007AFF; color: white;
        box-shadow: 0 4px 15px rgba(0,74,255,0.5);
      }
      #status { color: #ffffff; font-family: sans-serif; margin-top: 20px; font-size: 16px; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <button class="start-btn" onclick="startApp()">BAŞLAT</button>
      <div id="status">Kamera bekleniyor, lütfen izin verin...</div>
    </div>

    <script>
      // ODAKLANMIŞ MERKEZİ AYNALAMA SHADER'I
      AFRAME.registerShader('focused-mirror-shader', {
        schema: { src: { type: 'map', is: 'uniform' } },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          void main() {
            // vUv.x ekranın yatay eksenidir (0.0 en sol, 1.0 en sağ, 0.5 tam ortası)
            
            // AYNALAMA BÖLGESİ TANIMLAMA (Örn: Tam ortadaki %40'lık alan)
            // Eller buraya denk gelmelidir.
            float centerStart = 0.3; // Sol sınır
            float centerEnd = 0.7;   // Sağ sınır
            
            // Eğer piksel bu merkezi bölgenin dışındaysa, doğal kamerayı göster
            if (vUv.x < centerStart || vUv.x > centerEnd) {
              gl_FragColor = texture2D(src, vUv);
            } 
            // Eğer piksel merkezi bölgenin içindeyse, aynalama uygula
            else {
              // Sağ sağlam kol: vUv.x > 0.5 ise (bu bölgedeki) görüntüyü al
              if (vUv.x >= 0.5) {
                // Sağ taraf: Doğal kamerayı göster (bu bölgedeki)
                gl_FragColor = texture2D(src, vUv);
              } else {
                // Sol taraf: Sağ tarafın (bu bölgedeki) görüntüsünü al, 
                // yatay eksende ters çevirerek (aynalayarak) buraya bas.
                vec2 mirroredUv = vec2(1.0 - vUv.x, vUv.y);
                gl_FragColor = texture2D(src, mirroredUv);
              }
            }
          }
        `
      });
    </script>

    <a-scene webxr="referenceSpaceType: local">
      <a-assets>
        <video id="webcam" autoplay playsinline muted loop crossorigin="anonymous"></video>
      </a-assets>

      <a-entity camera look-controls position="0 1.6 0">
        <a-plane id="mirror-screen" 
                 position="0 -0.2 -1.0" 
                 rotation="-30 0 0"
                 width="4.5" 
                 height="3.2" 
                 material="shader: focused-mirror-shader; src: #webcam;">
        </a-plane>
      </a-entity>

      <a-sky color="#000000"></a-sky>
    </a-scene>

    <script>
      const video = document.querySelector('#webcam');
      const statusText = document.querySelector('#status');
      let localStream = null;

      navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: 1280, height: 720, frameRate: 60}})
        .then((stream) => {
          localStream = stream;
          video.srcObject = stream;
          statusText.style.color = "lime";
          statusText.innerHTML = "Kamera Hazır. Başlat butonuna basabilirsiniz.";
        })
        .catch((err) => { 
          statusText.style.color = "red";
          statusText.innerHTML = "Kamera izni alınamadı."; 
        });

      function startApp() {
        if (!localStream) return;
        video.play().then(() => {
          document.getElementById('overlay').style.display = 'none';
          setTimeout(() => { 
            document.querySelector('a-scene').enterVR(); 
          }, 200);
        });
      }
    </script>
  </body>
</html>
