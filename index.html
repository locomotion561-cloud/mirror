<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MirrorHands VR - Tam Ekran Dijital Ayna</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      /* El seçim butonlarını ekranın üzerinde göstermek için CSS */
      #menu-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        gap: 15px;
      }
      .btn {
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid #ffffff;
        border-radius: 30px;
        background-color: #007AFF;
        color: white;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      #status-text {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: lime;
        font-family: sans-serif;
        font-size: 16px;
        background: rgba(0,0,0,0.8);
        padding: 10px 20px;
        border-radius: 5px;
        z-index: 9999;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="menu-container">
      <button class="btn" onclick="startDigitalMirror('right')">Sağ El Sağlam</button>
      <button class="btn" onclick="startDigitalMirror('left')">Sol El Sağlam</button>
    </div>
    <div id="status-text">Kamera bekleniyor, lütfen izin verin...</div>

    <script>
      // Dikey Bölme ve Aynalama Yapan Özel WebGL Shader
      AFRAME.registerShader('digital-mirror-shader', {
        schema: {
          src: { type: 'map', is: 'uniform' },
          side: { type: 'int', is: 'uniform', default: 0 } // 0: Sağ sağlam, 1: Sol sağlam
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          uniform int side;

          void main() {
            // Ekranda dikey bir orta çizgi oluşturuyoruz (UV.x = 0.5)

            // SENARYO 1: SAĞ EL SAĞLAM (side == 0)
            if (side == 0) {
              if (vUv.x < 0.5) {
                // Ekranın Sol Yarısı (Hasarlı elin alanı): Sağ tarafın görüntüsünü aynalayarak buraya bas
                // Sağ tarafın UV'si 0.5'ten başlar, 1.0'a kadar gider. 
                // Bunu sol tarafa (0.0 - 0.5) aynalı olarak map'lemeliyiz.
                vec2 mirroredUv = vec2(1.0 - vUv.x, vUv.y); 
                gl_FragColor = texture2D(src, mirroredUv);
              } else {
                // Ekranın Sağ Yarısı (Sağlam elin alanı): Gerçek, doğal kamerayı olduğu gibi göster
                gl_FragColor = texture2D(src, vUv); 
              }
            } 
            // SENARYO 2: SOL EL SAĞLAM (side == 1)
            else {
              if (vUv.x > 0.5) {
                // Ekranın Sağ Yarısı (Hasarlı elin alanı): Sol tarafın görüntüsünü aynalayarak buraya bas
                vec2 mirroredUv = vec2(1.0 - vUv.x, vUv.y); 
                gl_FragColor = texture2D(src, mirroredUv);
              } else {
                // Ekranın Sol Yarısı (Sağlam elin alanı): Gerçek, doğal kamerayı olduğu gibi göster
                gl_FragColor = texture2D(src, vUv);
              }
            }
          }
        `
      });
    </script>

    <a-scene webxr="referenceSpaceType: local">
      <a-assets>
        <video id="webcam" autoplay playsinline muted loop crossorigin="anonymous"></video>
      </a-assets>

      <a-entity camera look-controls position="0 1.6 0">
        <a-plane id="mirror-screen" 
                 position="0 0 -1.0" 
                 width="2.7" 
                 height="2.0" 
                 material="shader: digital-mirror-shader; src: #webcam; side: 0;">
        </a-plane>
      </a-entity>

      <a-sky color="#000000"></a-sky>
    </a-scene>
