<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MirrorHands VR - Saf Dikey Ayna</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      /* Başlatma butonu ve uyarılar için CSS */
      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 9999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      .start-btn {
        padding: 20px 40px; font-size: 22px; font-weight: bold; cursor: pointer;
        border: 2px solid #ffffff; border-radius: 50px; background-color: #007AFF; color: white;
        box-shadow: 0 4px 15px rgba(0,74,255,0.5); transition: 0.2s;
      }
      .start-btn:active { transform: scale(0.95); background-color: #0056b3; }
      #status { color: #ffffff; font-family: sans-serif; margin-top: 20px; font-size: 16px; text-align: center; }
    </style>
  </head>
  <body>

    <div id="overlay">
      <button class="start-btn" onclick="startApp()">AYNAYI BAŞLAT</button>
      <div id="status">Kamera izni bekleniyor...</div>
    </div>

    <script>
      // EKRANI TAM ORTADAN BÖLÜP SAĞI SOLUN AYNASI YAPAN ÖZEL SHADER
      AFRAME.registerShader('pure-split-mirror', {
        schema: { src: { type: 'map', is: 'uniform' } },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          void main() {
            // vUv.x ekranın yatay eksenidir (0.0 en sol, 1.0 en sağ, 0.5 tam ortasıdır)
            
            if (vUv.x < 0.5) {
              // 1. Ekranın Sol Tarafı: Gerçek kamerayı olduğu gibi, doğal haliyle göster
              gl_FragColor = texture2D(src, vUv);
            } else {
              // 2. Ekranın Sağ Tarafı: Sol tarafın (0.0 - 0.5 arası) görüntüsünü 
              // matematiksel olarak ters çevirerek (aynalayarak) sağ tarafa bas
              vec2 mirroredUv = vec2(1.0 - vUv.x, vUv.y);
              gl_FragColor = texture2D(src, mirroredUv);
            }
          }
        `
      });
    </script>

    <a-scene webxr="referenceSpaceType: local">
      <a-assets>
        <video id="webcam" autoplay playsinline muted loop crossorigin="anonymous"></video>
      </a-assets>

      <a-entity camera look-controls position="0 1.6 0">
        <a-plane id="mirror-screen" 
                 position="0 0 -1.0" 
                 width="2.7" 
                 height="2.0" 
                 material="shader: pure-split-mirror; src: #webcam;">
        </a-plane>
      </a-entity>

      <a-sky color="#000000"></a-sky>
    </a-scene>

    <script>
      const video = document.querySelector('#webcam');
      const statusText = document.querySelector('#status');
      let localStream = null;

      // Sayfa yüklenir yüklenmez kamerayı arkada hazırla
      navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment', width: 640, height: 480, frameRate: 60}})
        .then((stream) => {
          localStream = stream;
          video.srcObject = stream;
          statusText.style.color = "lime";
          statusText.innerHTML = "Kamera Hazır. Butona basarak VR moduna geçebilirsiniz.";
        })
        .catch((err) => { 
          statusText.style.color = "red";
          statusText.innerHTML = "Kamera izni alınamadı: " + err.name; 
        });

      // Butona basıldığında çalışacak net fonksiyon
      function startApp() {
        if (!localStream) return;
        
        video.play().then(() => {
          // Giriş ekranını kaldır
          document.getElementById('overlay').style.display = 'none';
          
          // Telefonu doğrudan VR (Cardboard) moduna sok
          setTimeout(() => { 
            document.querySelector('a-scene').enterVR(); 
          }, 200);
        });
      }
    </script>
  </body>
</html>
